services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: fleetos-postgres
    environment:
      POSTGRES_USER: fleetos
      POSTGRES_PASSWORD: fleetos
      POSTGRES_DB: fleetos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fleetos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
